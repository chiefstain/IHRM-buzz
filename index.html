<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Reflection & Q&A Platform — AI & HR</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{
  --bg:#07090F;--card:#0F1420;--card2:#141B2A;--card3:#1A2235;
  --coral:#FF6B6B;--mint:#00E5A0;--amber:#FFB347;--sky:#4FC3F7;
  --gold:#FFD700;--purple:#B388FF;--pink:#FF6EC7;--teal:#26C6DA;
  --tx:#C8D6E5;--dim:#556677;--wh:#fff;--slate:#1A2235;--border:#1E2D42;
  --radius:16px;--gap:12px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Space Grotesk',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;top:0;left:0;right:0;height:300px;background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(79,195,247,.07),transparent);pointer-events:none;z-index:0}

.container{max-width:920px;margin:0 auto;padding:16px;position:relative;z-index:1}
.hidden{display:none!important}
button{font-family:inherit;cursor:pointer;border:none;transition:all .18s;font-weight:600}
button:hover{transform:translateY(-1px)}
button:active{transform:translateY(0) scale(.98)}
input,textarea,select{font-family:inherit;background:var(--slate);border:1.5px solid var(--border);border-radius:12px;padding:12px 16px;color:var(--wh);font-size:14px;width:100%;outline:none;transition:border-color .2s,box-shadow .2s}
input:focus,textarea:focus,select:focus{border-color:var(--sky);box-shadow:0 0 0 3px rgba(79,195,247,.12)}
textarea{resize:vertical;min-height:100px}

.btn{border-radius:12px;padding:12px 24px;font-size:14px;font-weight:700;letter-spacing:.2px;position:relative;overflow:hidden}
.btn::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,0);transition:background .15s}
.btn:hover::after{background:rgba(255,255,255,.07)}
.btn-coral{background:linear-gradient(135deg,#FF6B6B,#E53E3E);color:#fff;box-shadow:0 4px 15px rgba(255,107,107,.25)}
.btn-mint{background:linear-gradient(135deg,#00E5A0,#00B377);color:#000;box-shadow:0 4px 15px rgba(0,229,160,.2)}
.btn-sky{background:linear-gradient(135deg,#4FC3F7,#0288D1);color:#fff;box-shadow:0 4px 15px rgba(79,195,247,.2)}
.btn-amber{background:linear-gradient(135deg,#FFB347,#E67E00);color:#000;box-shadow:0 4px 15px rgba(255,179,71,.2)}
.btn-purple{background:linear-gradient(135deg,#B388FF,#7C4DFF);color:#fff;box-shadow:0 4px 15px rgba(179,136,255,.2)}
.btn-pink{background:linear-gradient(135deg,#FF6EC7,#E91E8C);color:#fff;box-shadow:0 4px 15px rgba(255,110,199,.2)}
.btn-ghost{background:rgba(255,255,255,.05);color:var(--tx);border:1px solid var(--border)}
.btn-ghost:hover{background:rgba(255,255,255,.09);border-color:rgba(255,255,255,.2)}
.btn-sm{padding:8px 16px;font-size:12px;border-radius:10px}
.btn-full{width:100%;display:block;text-align:center}
.btn-xs{padding:5px 12px;font-size:11px;border-radius:8px}

.card{background:var(--card);border-radius:20px;padding:24px;border:1px solid rgba(255,255,255,.05);box-shadow:0 8px 32px rgba(0,0,0,.3)}
.card2{background:var(--card2);border-radius:14px;padding:18px;border:1px solid rgba(255,255,255,.04)}
.card3{background:var(--card3);border-radius:12px;padding:14px;border:1px solid rgba(255,255,255,.03)}

.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.3px}
.tag-coral{background:rgba(255,107,107,.15);color:var(--coral)}
.tag-mint{background:rgba(0,229,160,.12);color:var(--mint)}
.tag-sky{background:rgba(79,195,247,.12);color:var(--sky)}
.tag-amber{background:rgba(255,179,71,.12);color:var(--amber)}
.tag-purple{background:rgba(179,136,255,.12);color:var(--purple)}
.tag-pink{background:rgba(255,110,199,.12);color:var(--pink)}
.tag-teal{background:rgba(38,198,218,.12);color:var(--teal)}

.header{text-align:center;padding:28px 0 18px}
.header h1{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;color:var(--wh);margin-bottom:4px;background:linear-gradient(135deg,#fff,#4FC3F7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header p{color:var(--dim);font-size:13px}

.tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap;background:rgba(255,255,255,.03);border-radius:14px;padding:5px;border:1px solid var(--border)}
.tab{padding:8px 14px;border-radius:10px;font-size:12px;font-weight:600;color:var(--dim);cursor:pointer;transition:all .2s;white-space:nowrap;flex:1;text-align:center}
.tab.active{background:rgba(79,195,247,.12);color:var(--sky);box-shadow:0 2px 8px rgba(79,195,247,.1)}
.tab:hover:not(.active){color:var(--tx);background:rgba(255,255,255,.04)}

.progress-ring{display:flex;gap:4px;margin:8px 0}
.progress-ring .dot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;background:var(--slate);color:var(--dim);transition:all .3s}
.progress-ring .dot.done{background:var(--mint);color:#000}
.progress-ring .dot.current{background:var(--sky);color:#fff;box-shadow:0 0 12px rgba(79,195,247,.5)}

.score-bar{height:6px;border-radius:3px;background:var(--slate);overflow:hidden;margin:6px 0}
.score-fill{height:100%;border-radius:3px;transition:width .6s cubic-bezier(.4,0,.2,1)}

.member-chip{background:rgba(255,255,255,.06);padding:4px 12px;border-radius:20px;font-size:12px;color:var(--tx);border:1px solid rgba(255,255,255,.08)}

/* MCQ Options */
.mcq-option{display:block;width:100%;text-align:left;padding:15px 18px;border-radius:12px;background:var(--slate);color:var(--tx);font-size:14px;margin-bottom:8px;border:2px solid transparent;cursor:pointer;transition:all .18s;position:relative}
.mcq-option:hover:not(:disabled){border-color:rgba(79,195,247,.4);background:rgba(79,195,247,.06);transform:translateX(3px)}
.mcq-option.selected{border-color:var(--sky);background:rgba(79,195,247,.1);color:var(--wh)}
.mcq-option.correct{border-color:var(--mint);background:rgba(0,229,160,.1);color:var(--mint)}
.mcq-option.wrong{border-color:var(--coral);background:rgba(255,107,107,.1);color:var(--coral)}
.mcq-option:disabled{cursor:default}
.mcq-option .opt-letter{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,.08);font-size:11px;font-weight:700;margin-right:10px;flex-shrink:0}

/* Timer */
.timer-ring{position:relative;display:inline-flex;align-items:center;justify-content:center}
.timer-ring svg{transform:rotate(-90deg)}
.timer-ring .time-text{position:absolute;font-family:'Syne',sans-serif;font-size:22px;font-weight:800}
.timer-bar{height:8px;border-radius:4px;background:var(--slate);overflow:hidden;margin-bottom:16px;position:relative}
.timer-fill{height:100%;border-radius:4px;transition:width .9s linear}
.timer-fill.urgent{animation:urgentPulse .5s ease infinite alternate}
@keyframes urgentPulse{from{opacity:1}to{opacity:.6}}

/* Scoreboard */
.sb-row{display:grid;grid-template-columns:44px 1fr 70px 70px 80px;gap:8px;padding:10px 14px;border-radius:12px;align-items:center;transition:background .2s}
.sb-row:hover{background:rgba(255,255,255,.03)}

/* Celebration */
@keyframes confettiFall{
  0%{transform:translateY(-20px) rotate(0);opacity:1}
  100%{transform:translateY(110vh) rotate(720deg);opacity:0}
}
.confetti-piece{position:fixed;width:10px;height:10px;border-radius:2px;pointer-events:none;z-index:9999;animation:confettiFall linear forwards}

/* Pulse animation for live indicator */
@keyframes livePulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--mint);display:inline-block;animation:livePulse 1.5s ease infinite;margin-right:6px}

/* Notification toast */
.toast{position:fixed;bottom:24px;right:24px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px 20px;font-size:14px;color:var(--wh);z-index:10000;animation:slideUp .3s ease;box-shadow:0 8px 32px rgba(0,0,0,.4);max-width:320px}
.toast.success{border-color:rgba(0,229,160,.3);background:rgba(0,229,160,.08)}
.toast.info{border-color:rgba(79,195,247,.3);background:rgba(79,195,247,.08)}
.toast.warning{border-color:rgba(255,179,71,.3);background:rgba(255,179,71,.08)}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}

/* Fade/slide animations */
.fade-in{animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.scale-in{animation:scaleIn .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes scaleIn{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}

/* Group color borders */
.group-coral{border-left:4px solid var(--coral)!important}
.group-mint{border-left:4px solid var(--mint)!important}
.group-amber{border-left:4px solid var(--amber)!important}
.group-sky{border-left:4px solid var(--sky)!important}
.group-purple{border-left:4px solid var(--purple)!important}
.group-pink{border-left:4px solid var(--pink)!important}

/* Reason reveal box */
.reason-box{background:linear-gradient(135deg,rgba(0,229,160,.07),rgba(79,195,247,.05));border:1px solid rgba(0,229,160,.2);border-radius:12px;padding:14px;margin-top:12px;font-size:13px;color:var(--tx);line-height:1.6;animation:fadeIn .4s ease}
.reason-box strong{color:var(--mint)}

/* Scoreboard live badge */
.live-badge{background:rgba(0,229,160,.1);border:1px solid rgba(0,229,160,.3);color:var(--mint);padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;display:inline-flex;align-items:center;gap:4px}

/* Admin toggle */
.admin-toggle{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--card2);border-radius:12px;margin-bottom:6px}
.toggle{width:44px;height:24px;border-radius:12px;background:var(--slate);position:relative;cursor:pointer;transition:background .3s;flex-shrink:0}
.toggle.on{background:var(--mint)}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform .3s}
.toggle.on::after{transform:translateX(20px)}

.qr-container{background:var(--wh);border-radius:16px;padding:14px;display:inline-block;box-shadow:0 0 40px rgba(79,195,247,.15)}
.qr-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;margin:16px 0}
.url-display{background:var(--slate);border:1px solid var(--border);border-radius:10px;padding:10px 18px;font-size:13px;color:var(--sky);font-weight:600;display:inline-flex;align-items:center;gap:8px;cursor:pointer;transition:all .2s}
.url-display:hover{border-color:var(--sky);background:rgba(79,195,247,.08)}

/* Notification bell pulse */
@keyframes bellShake{0%,100%{transform:rotate(0)}25%{transform:rotate(-10deg)}75%{transform:rotate(10deg)}}
.notify-bell{animation:bellShake .4s ease 3}

/* Big stat */
.big-stat{font-family:'Syne',sans-serif;font-size:52px;font-weight:800;line-height:1}

@media(max-width:600px){
  .container{padding:10px}
  .card{padding:16px}
  .header h1{font-size:24px}
  .sb-row{grid-template-columns:32px 1fr 55px 55px 65px;font-size:12px}
  .big-stat{font-size:38px}
  .tabs .tab{font-size:11px;padding:7px 8px}
}
</style>
</head>
<body>
<div class="container" id="app">
  <div class="header">
    <div style="font-size:40px;margin-bottom:6px">🎯</div>
    <h1>Reflection & Q&A Platform</h1>
    <p>AI & HR Professional Development</p>
    <div style="margin-top:8px;font-size:11px;color:var(--dim)">Prepared by <strong style="color:var(--sky)">Danstan Akwiri</strong> · <a href="https://www.linkedin.com/in/danstanakwiri/" target="_blank" style="color:var(--sky);text-decoration:none">LinkedIn</a></div>
  </div>
  <div class="tabs" id="nav-tabs"></div>
  <div id="screen-area"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════════════════
const TOPICS = [
  "Overview of AI Tools for HR & Management",
  "Data-Driven Decision Making in Practice",
  "Hands-on Session: Applying AI Tools in HR",
  "Human-Centered Leadership in the Age of AI"
];

const OPEN_QUESTIONS = [
  {topic:0,q:"Identify 3 AI tools that could transform recruitment in your organization and explain how you would implement one of them within 90 days.",level:"Application"},
  {topic:0,q:"Your CEO asks: 'Why should we invest in AI for HR when we already have an HRIS?' Draft a 2-minute business case with specific ROI data.",level:"Synthesis"},
  {topic:0,q:"A department head says AI-powered performance monitoring will 'keep employees accountable.' What ethical concerns would you raise and how would you propose an alternative approach?",level:"Evaluation"},
  {topic:0,q:"Map the AI tools ecosystem for your organization: which of the 7 HR categories should be your priority and why? What tool would you pilot first?",level:"Analysis"},
  {topic:0,q:"An AI recruitment tool screens out 80% of applicants. A hiring manager complains about missing 'good candidates.' How would you investigate and respond?",level:"Problem-Solving"},
  {topic:0,q:"Compare the strengths and limitations of generative AI (ChatGPT/Claude) versus specialist HR AI tools (Eightfold/Visier). When would you use each?",level:"Analysis"},
  {topic:1,q:"A senior leader says 'I've been in this industry for 20 years — I don't need data to make hiring decisions.' How would you respectfully make the case for data-driven approaches?",level:"Application"},
  {topic:1,q:"Your attrition rate is 22%. Using the DDDM framework (Define→Collect→Analyse→Decide→Review), outline how you would investigate and address this.",level:"Application"},
  {topic:1,q:"You have data showing that remote workers are 12% more productive but 15% less collaborative. The CEO wants everyone back in office. What do you recommend and why?",level:"Synthesis"},
  {topic:1,q:"Identify 3 cognitive biases that could affect a promotion decision and explain how data can correct each one.",level:"Analysis"},
  {topic:1,q:"You discover that your AI analytics tool's attrition predictions are 87% accurate overall but only 62% accurate for employees under 25. What do you do?",level:"Evaluation"},
  {topic:1,q:"Design a 'data dashboard' for a Head of HR: what 5 metrics would you include, why, and how often should each be updated?",level:"Synthesis"},
  {topic:2,q:"Simulate this scenario: You need to draft a job description using AI, then audit it for bias. Walk through the exact steps, prompts, and checks you would perform.",level:"Application"},
  {topic:2,q:"A manager asks you to use AI to identify which team members are 'flight risks.' Design the workflow: what data, what tool, what safeguards, what human oversight?",level:"Synthesis"},
  {topic:2,q:"Your company deployed an AI chatbot for employee queries. After 3 months, 40% of employees say they prefer talking to a human. What went wrong and how do you fix it?",level:"Problem-Solving"},
  {topic:2,q:"Create a practical plan: How would you use AI to personalise learning pathways for 500 employees with different roles, skill levels, and career goals?",level:"Application"},
  {topic:2,q:"You're asked to build a business case for implementing Visier. What specific outcomes would you promise, and how would you measure success at 6 months?",level:"Synthesis"},
  {topic:2,q:"An AI tool recommends terminating an employee contract based on performance data. The employee's manager disagrees strongly. Facilitate this decision using the HEAR framework.",level:"Problem-Solving"},
  {topic:3,q:"Using the 5-Pillar Model (Empathy, Ethics, Clarity, Growth Mindset, Trust), rate your own leadership on a 1-5 scale for each pillar and identify your top growth area.",level:"Self-Assessment"},
  {topic:3,q:"'AI doesn't create culture — it amplifies it.' Give a real or hypothetical example of AI amplifying a healthy culture AND a toxic culture.",level:"Analysis"},
  {topic:3,q:"Satya Nadella transformed Microsoft from a 'know-it-all' to a 'learn-it-all' culture. What specific leadership actions could you apply in your own organization?",level:"Application"},
  {topic:3,q:"The 'leadership atrophy' risk: As AI handles more tasks, leaders may stop practising human judgment. Design 3 concrete practices that prevent this atrophy.",level:"Synthesis"},
  {topic:3,q:"48% of employees would leave a role with 'emotionally unavailable' leadership. With AI handling more routine interactions, how do you ensure your leadership remains emotionally present?",level:"Evaluation"},
  {topic:3,q:"M-Kopa in Kenya uses AI for credit scoring but maintains human agents for relationship-based support. What leadership principles from this case apply to YOUR industry?",level:"Application"},
];

const MCQ_BANK = [
  {topic:0,q:"What percentage of HR functions now use AI tools according to SHRM 2026?",opts:["26%","43%","67%","81%"],correct:1,reason:"SHRM 2026 data shows 43% of HR functions have adopted AI tools, reflecting rapid growth from under 30% just two years prior. This marks a tipping point for mainstream adoption in the profession."},
  {topic:0,q:"Which AI tool uses deep learning on 1.6B+ career profiles for talent matching?",opts:["HireVue","Greenhouse","Eightfold.ai","SeekOut"],correct:2,reason:"Eightfold.ai is trained on over 1.6 billion career profiles, enabling it to match talent based on potential and skills rather than just job titles. This makes it uniquely powerful for diversity hiring and internal mobility."},
  {topic:0,q:"What does the 'T' stand for in the FITS Framework for AI tool selection?",opts:["Timely","Transparent","Technical","Tested"],correct:1,reason:"In the FITS Framework, T stands for Transparent — meaning the AI tool must be explainable. HR decisions affecting people's careers must not be black boxes; transparency enables auditability and fairness."},
  {topic:0,q:"Which company acquired Paradox (conversational AI) in 2025?",opts:["SAP","Oracle","Workday","Microsoft"],correct:2,reason:"Workday acquired Paradox in 2025, signaling that conversational AI (chatbots for recruiting) is now considered core HCM infrastructure. This acquisition underscores AI's move from a feature to a foundational layer."},
  {topic:0,q:"AI-powered hiring tools can improve workforce diversity by approximately:",opts:["10%","20%","35%","50%"],correct:2,reason:"Research shows AI-driven blind screening and structured assessment can improve workforce diversity by around 35% by removing unconscious bias in résumé filtering and interview scheduling. However, this benefit is lost if the training data itself is biased."},
  {topic:1,q:"According to the DDDM framework, what is the most neglected step?",opts:["Define","Collect","Analyse","Review"],correct:3,reason:"The Review step is most frequently skipped in practice. Organizations often complete a data project, make a decision, then move on — without looping back to evaluate whether the decision worked. Without review, you cannot improve future decisions."},
  {topic:1,q:"What percentage of decisions in organisations are based on intuition rather than evidence?",opts:["28%","42%","58%","73%"],correct:2,reason:"Studies consistently show that 58% of organizational decisions are gut-driven rather than evidence-based. This is especially prevalent in promotions and hiring, where familiarity and comfort often substitute for data."},
  {topic:1,q:"Predictive AI can forecast employee turnover with what accuracy?",opts:["65%","72%","87%","95%"],correct:2,reason:"Modern predictive analytics can forecast turnover with up to 87% accuracy when trained on enough behavioral and engagement data. However, accuracy drops when data is incomplete or when external factors (like a pandemic) break historical patterns."},
  {topic:1,q:"Which cognitive bias involves over-weighting the first piece of information received?",opts:["Confirmation Bias","Anchoring Bias","Recency Bias","Survivorship Bias"],correct:1,reason:"Anchoring Bias causes us to over-rely on the first number or fact we encounter. In HR, this is dangerous when salary negotiations or performance scores are set early and all subsequent information is adjusted around that initial anchor."},
  {topic:1,q:"The average cost of a bad senior hiring decision is approximately:",opts:["$50K","$100K","$250K","$500K"],correct:2,reason:"Research puts the cost of a failed senior hire at roughly 2.5–5x their annual salary when you factor in recruitment costs, onboarding, lost productivity, team morale impact, and separation costs. For a $100K role, that's $250K or more."},
  {topic:2,q:"What is 'agentic AI' in the context of HR recruitment?",opts:["AI that replaces recruiters entirely","AI that reasons, plans and acts autonomously on tasks","AI limited to answering FAQs","AI that only works with structured data"],correct:1,reason:"Agentic AI can reason over a goal, break it into steps, and execute them autonomously — for example, sourcing candidates, screening CVs, scheduling interviews, and sending follow-ups without human prompting at each stage. This is a major leap from chatbots."},
  {topic:2,q:"When deploying AI for employee performance monitoring, what should always be maintained?",opts:["Full automation","Human override capability","Anonymous data only","Monthly reporting only"],correct:1,reason:"Human override capability is non-negotiable in performance AI. No algorithm should have the final say on someone's career without a human being able to review, challenge, and override the output. This is required by the EU AI Act for high-risk HR systems."},
  {topic:2,q:"The EU AI Act classifies AI hiring tools as:",opts:["Low-risk","Medium-risk","High-risk","Prohibited"],correct:2,reason:"AI systems used in hiring, promotion, and performance management are classified as High-Risk under the EU AI Act. This requires mandatory human oversight, bias auditing, transparency documentation, and conformity assessments before deployment."},
  {topic:2,q:"What does the 'H' in the HEAR Framework stand for?",opts:["Holistic approach","Human oversight","Hiring accuracy","Historical data"],correct:1,reason:"In the HEAR Framework (Human Oversight, Explainable decisions, Accountability loops, Review mechanism), the H stands for Human Oversight — the principle that AI outputs in HR must always be reviewed, challenged, and validated by a qualified human decision-maker."},
  {topic:2,q:"AI-based skill matching can predict job performance with what accuracy?",opts:["55%","67%","78%","92%"],correct:2,reason:"Skills-based AI matching (like Eightfold and Phenom) achieves around 78% predictive accuracy for job performance — significantly outperforming traditional CV screening but still requiring human judgment for cultural fit and context."},
  {topic:3,q:"According to research, what percentage of top-performing leaders have high emotional intelligence?",opts:["60%","75%","85%","90%"],correct:3,reason:"TalentSmart research found that 90% of top performers score high on emotional intelligence (EQ). As AI automates more analytical tasks, EQ becomes the defining differentiator of effective human leadership in the AI age."},
  {topic:3,q:"What did Satya Nadella replace Microsoft's 'know-it-all' culture with?",opts:["Performance culture","Learn-it-all culture","Innovation culture","Data culture"],correct:1,reason:"Nadella replaced Microsoft's toxic fixed-mindset 'know-it-all' culture with a 'learn-it-all' growth mindset culture rooted in Carol Dweck's research. This transformation helped grow Microsoft's market cap from $300B to over $3T — one of the greatest corporate turnarounds in history."},
  {topic:3,q:"The 'leadership atrophy' risk refers to:",opts:["Leaders being replaced by AI","Leaders losing human judgment skills from over-relying on AI","Leaders refusing to adopt AI","Leaders spending too much on AI tools"],correct:1,reason:"Leadership atrophy is the risk that as AI handles more decisions, leaders stop exercising — and therefore weaken — their capacity for empathy, nuanced judgment, and ethical reasoning. Like a muscle, leadership capability deteriorates without regular use."},
  {topic:3,q:"What percentage of employees would leave a role with 'emotionally unavailable' leadership?",opts:["25%","34%","48%","62%"],correct:2,reason:"Research shows 48% of employees would leave a job because of emotionally unavailable leadership. As AI takes over transactional interactions, the expectation for human leaders to provide emotional presence, meaning, and psychological safety has never been higher."},
  {topic:3,q:"According to the 5-Pillar Model, which is NOT one of the pillars?",opts:["Empathy","Efficiency","Clarity","Trust Building"],correct:1,reason:"Efficiency is NOT one of the five pillars of human-centered leadership. The pillars are Empathy, Ethics, Clarity, Growth Mindset, and Trust Building. Efficiency is important but it's an outcome — not a foundational leadership principle in the human-centered model."},

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function getGroupColor(gName){const g=STATE.groups[gName];return g?GRP_COLORS_MAP[g.color]:"var(--coral)";}
function getGroupTag(gName){const g=STATE.groups[gName];const idx=GRP_COLOR_KEYS.indexOf(g?.color);return GRP_TAG_CLASSES[idx>=0?idx:0];}
function getGroupIdx(gName){return Object.keys(STATE.groups).indexOf(gName);}

function toast(msg,type="info",duration=3200){
  const el=document.createElement("div");
  el.className=`toast ${type}`;
  el.innerHTML=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),duration);
}

function confetti(){
  const colors=["#FF6B6B","#00E5A0","#FFB347","#4FC3F7","#B388FF","#FFD700","#FF6EC7"];
  for(let i=0;i<60;i++){
    const el=document.createElement("div");
    el.className="confetti-piece";
    el.style.cssText=`left:${Math.random()*100}vw;top:-20px;background:${colors[Math.floor(Math.random()*colors.length)]};transform:rotate(${Math.random()*360}deg);animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*.5}s;width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>.5?'50%':'2px'}`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),3500);
  }
}

function addNotification(forGroup, message){
  if(!STATE.notifications) STATE.notifications=[];
  STATE.notifications.push({for:forGroup,message,timestamp:Date.now(),read:false});
  save();
}

function getUnreadNotifications(group){
  if(!STATE.notifications) return [];
  return STATE.notifications.filter(n=>n.for===group&&!n.read);
}

function markNotificationsRead(group){
  if(!STATE.notifications) return;
  STATE.notifications.filter(n=>n.for===group).forEach(n=>n.read=true);
  save();
}

// QUESTION ASSIGNMENT
// ═══════════════════════════════════════════════════════════════
function assignQuestions(){
  const groups=Object.keys(STATE.groups);
  if(groups.length<1)return;
  const usedOpen=new Set();
  const usedMcq=new Set();
  STATE.assignments={};
  STATE.answers={};
  
  // Build mark rotation (circular)
  const markMap={};
  groups.forEach((g,i)=>markMap[g]=groups[(i+1)%groups.length]);
  
  groups.forEach(g=>{
    // 4 open questions — one per topic
    const openQs=[];
    for(let t=0;t<4;t++){
      const pool=OPEN_QUESTIONS.map((q,i)=>({...q,idx:i})).filter(q=>q.topic===t&&!usedOpen.has(q.idx));
      if(pool.length>0){const pick=pool[Math.floor(Math.random()*pool.length)];openQs.push(pick.idx);usedOpen.add(pick.idx);}
    }
    // 10 MCQs — randomized PER GROUP (each group gets different order)
    const mcqPool=MCQ_BANK.map((q,i)=>({...q,idx:i})).filter(q=>!usedMcq.has(q.idx));
    const mcqPick=shuffle(mcqPool).slice(0,10);
    const mcqIdxs=mcqPick.map(m=>{usedMcq.add(m.idx);return m.idx;});
    
    STATE.assignments[g]={open:openQs,mcq:mcqIdxs,markGroup:markMap[g]};
    STATE.answers[g]={
      open:openQs.map(idx=>({qIdx:idx,answer:"",submitted:false,markedBy:"",score:null})),
      mcq:mcqIdxs.map(idx=>({qIdx:idx,selected:null,correct:MCQ_BANK[idx].correct})),
      mcqDone:false,openDone:false,currentOpenIdx:0
    };
  });
  STATE.sessionActive=true;
  save();
}

function createGroup(){
  const nameEl=$("new-group-name");
  const membersEl=$("new-group-members");
  if(!nameEl||!membersEl)return;
  const name=nameEl.value.trim();
  const members=membersEl.value.split(",").map(m=>m.trim()).filter(m=>m.length>0);
  if(!name){toast("⚠️ Please enter a group name","warning");return;}
  if(members.length<1){toast("⚠️ Add at least one member name","warning");return;}
  if(STATE.groups[name]){toast("⚠️ A group with that name already exists","warning");return;}
  if(Object.keys(STATE.groups).length>=6){toast("⚠️ Maximum 6 groups allowed","warning");return;}
  
  const usedColors=Object.values(STATE.groups).map(g=>g.color);
  const availColor=GRP_COLOR_KEYS.find(c=>!usedColors.includes(c))||_selectedColor;
  const color=_selectedColor&&!usedColors.includes(_selectedColor)?_selectedColor:availColor;
  
  STATE.groups[name]={members,color};
  save();

function submitOpenAnswer(group,idx){
  const answer=($("open-answer")?.value||"").trim();
  if(answer.length<20){toast("⚠️ Please write at least 20 characters","warning");return;}
  STATE.answers[group].open[idx].answer=answer;
  STATE.answers[group].open[idx].submitted=true;
  STATE.answers[group].currentOpenIdx=idx+1;
  const allDone=STATE.answers[group].open.every(o=>o.submitted);
  if(allDone){STATE.answers[group].openDone=true;}
  save();render();
}

// ═══════════════════════════════════════════════════════════════
// MCQ — WITH TIMER + RANDOMIZED OPTIONS + REASONS
// ═══════════════════════════════════════════════════════════════
let _mcqTimerInterval=null;

function startMcq(group){
  STATE._activeGroup=group;
  STATE.currentView="mcq";
  const ans=STATE.answers[group];
  const first=ans.mcq.findIndex(m=>m.selected===null);
  STATE._mcqIdx=first>=0?first:0;
  save();render();
}

function renderMcq(el,group){
  const ans=STATE.answers[group];
  
  if(ans.mcqDone){
    // Clear any running timer
    if(_mcqTimerInterval){clearInterval(_mcqTimerInterval);_mcqTimerInterval=null;}
    const correct=ans.mcq.filter(m=>m.selected===m.correct).length;
    const emoji=correct>=9?"🏆":correct>=7?"🌟":correct>=5?"💡":correct>=3?"📚":"🔍";
    el.innerHTML=`
      <div class="card fade-in" style="text-align:center">
        <div style="font-size:52px;margin-bottom:6px">${emoji}</div>
        <h3 style="color:var(--wh);font-family:'Syne',sans-serif;font-size:22px;margin-bottom:4px">MCQ Complete!</h3>
        <div class="big-stat" style="color:var(--sky);margin:10px 0">${correct}<span style="font-size:24px;color:var(--dim)">/10</span></div>
        <p style="color:var(--tx);font-size:14px;margin-bottom:20px">${correct>=8?"Excellent!":correct>=6?"Well done!":correct>=4?"Good effort!":"Keep studying!"}</p>
        <div style="text-align:left;margin-bottom:16px">
          ${ans.mcq.map((m,i)=>{
            const q=MCQ_BANK[m.qIdx];
            const correct2=m.selected===m.correct;
            return`<div class="card2" style="margin-bottom:8px;border-left:3px solid ${correct2?"var(--mint)":"var(--coral)"}">
              <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
                <p style="font-size:12px;color:var(--tx);flex:1">${i+1}. ${q.q}</p>
                <span style="font-size:18px;flex-shrink:0">${correct2?"✓":"✗"}</span>
              </div>
              <div style="font-size:11px;margin-top:4px">
                ${m.selected!==null?`<span style="color:${correct2?"var(--mint)":"var(--coral)"}">Your answer: ${q.opts[m.selected]}</span>`:"<span style='color:var(--dim)'>No answer (timed out)</span>"}
                ${!correct2?`<span style="color:var(--dim)"> → Correct: <strong style="color:var(--mint)">${q.opts[q.correct]}</strong></span>`:""}
              </div>
              <div style="font-size:11px;color:var(--dim);margin-top:5px;line-height:1.5">💡 ${q.reason}</div>
            </div>`;
          }).join("")}
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-ghost" style="flex:1" onclick="enterGroup('${group}')">← Back to Hub</button>
          <button class="btn btn-sky" style="flex:1" onclick="navigate('scoreboard')">🏆 Scoreboard</button>
        </div>
      </div>`;
    return;
  }
  
  const idx=STATE._mcqIdx;
  if(idx>=10){ans.mcqDone=true;save();renderMcq(el,group);return;}
  
  const m=ans.mcq[idx];
  const q=MCQ_BANK[m.qIdx];
  const timerMax=STATE.admin.mcqTimer||30;
  
  // Each group gets shuffled option ORDER per question (randomized presentation)
  // But we store the mapping so scoring still works
  if(!m.shuffleMap){
    const map=shuffle([0,1,2,3]);
    m.shuffleMap=map; // map[displayIdx] = originalIdx
    save();
  }
  const smap=m.shuffleMap;
  const answered=m.selected!==null||m.timedOut;
  
  el.innerHTML=`
    <div class="card fade-in">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <span class="badge ${["tag-coral","tag-mint","tag-sky","tag-amber"][q.topic]}">${TOPICS[q.topic].split(":")[0]}</span>
        <div style="display:flex;align-items:center;gap:10px">
          <span id="timer-display" style="font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--amber)">${timerMax}</span>
          <span style="color:var(--dim);font-size:12px">${idx+1}/10</span>
        </div>
      </div>
      
      <!-- Timer bar -->
      <div class="timer-bar">
        <div id="timer-fill" class="timer-fill" style="width:100%;background:linear-gradient(90deg,var(--mint),var(--amber))"></div>
      </div>
      
      <div class="score-bar" style="margin-bottom:14px">
        <div class="score-fill" style="width:${idx*10}%;background:var(--sky)"></div>
      </div>
      
      <p style="color:var(--wh);font-size:15px;line-height:1.55;margin-bottom:16px;font-weight:500">${q.q}</p>
      
      ${smap.map((origIdx,di)=>{
        let cls="mcq-option";
        if(answered){
          if(origIdx===q.correct)cls+=" correct";
          else if(m.selected===origIdx&&origIdx!==q.correct)cls+=" wrong";
        }
        const letter=String.fromCharCode(65+di);
        return`<button class="${cls}" ${answered?"disabled":""} onclick="selectMcq('${group}',${idx},${origIdx})">
          <span class="opt-letter">${letter}</span>${q.opts[origIdx]}
        </button>`;
      }).join("")}
      
      ${answered?`
        <div class="reason-box">
          <strong>💡 Why ${m.timedOut?"the correct answer is: "+q.opts[q.correct]:"this is correct"}:</strong><br>${q.reason}
        </div>
        <button class="btn btn-sky btn-full" style="margin-top:12px" onclick="nextMcq('${group}')">${idx<9?"Next Question →":"See Results 🏁"}</button>
      `:""}
    </div>
  `;
  
  // Start timer if not answered
  if(!answered){
    if(_mcqTimerInterval)clearInterval(_mcqTimerInterval);
    let remaining=timerMax;
    const fillEl=()=>document.getElementById("timer-fill");
    const dispEl=()=>document.getElementById("timer-display");
    
    _mcqTimerInterval=setInterval(()=>{
      remaining--;
      const pct=(remaining/timerMax)*100;
      const fe=fillEl();const de=dispEl();
      if(fe){
        fe.style.width=pct+"%";
        if(remaining<=5){fe.classList.add("urgent");fe.style.background="var(--coral)";}
        else if(remaining<=timerMax*0.4){fe.style.background="linear-gradient(90deg,var(--amber),var(--coral))";}
      }
      if(de){
        de.textContent=remaining;
        if(remaining<=5)de.style.color="var(--coral)";
      }
      if(remaining<=0){
        clearInterval(_mcqTimerInterval);_mcqTimerInterval=null;
        // Time's up — mark as timed out, no selection
        STATE.answers[group].mcq[idx].timedOut=true;
        save();render();
        toast("⏰ Time's up! Moving on...","warning",1800);
      }
    },1000);
  } else {
    if(_mcqTimerInterval){clearInterval(_mcqTimerInterval);_mcqTimerInterval=null;}
  }
}

function selectMcq(group,qIdx,origOptIdx){
  if(_mcqTimerInterval){clearInterval(_mcqTimerInterval);_mcqTimerInterval=null;}
  STATE.answers[group].mcq[qIdx].selected=origOptIdx;
  // Recalculate correct based on original indices
  const q=MCQ_BANK[STATE.answers[group].mcq[qIdx].qIdx];
  STATE.answers[group].mcq[qIdx].correct=q.correct;
  save();render();
}

function nextMcq(group){
  STATE._mcqIdx=(STATE._mcqIdx||0)+1;
  if(STATE._mcqIdx>=10){STATE.answers[group].mcqDone=true;confetti();}
  save();render();
}

function submitPeerMark(markerGroup,targetGroup,qIdx,score){

  }
  const pool=INDIVIDUAL_MCQ.map((q,i)=>i);
  const picked=shuffle(pool).slice(0,5);
  STATE.individuals[name]={
    mcqIdxs:picked,

      const shuffleMap=shuffle([0,1,2,3]);

          const correct2=m.selected===m.correct;
          return`<div class="card2" style="margin-bottom:8px;border-left:3px solid ${correct2?"var(--mint)":"var(--coral)"}">
            <p style="font-size:12px;color:var(--tx);margin-bottom:4px">${i+1}. ${q.q}</p>
            <div style="font-size:11px;margin-bottom:5px">
              <span style="color:${correct2?"var(--mint)":"var(--coral)"};font-weight:700">${correct2?"✓ Correct":"✗ Wrong"}</span>
              ${m.timedOut?`<span style="color:var(--dim)"> — Timed out</span>`:""}
              ${!correct2&&!m.timedOut?`<span style="color:var(--dim)"> — Your answer: ${q.opts[m.selected]}</span>`:""}
              ${!correct2?`<span style="color:var(--dim)"> → Correct: <strong style="color:var(--mint)">${q.opts[q.correct]}</strong></span>`:""}
            </div>
            <div style="font-size:11px;color:var(--dim);line-height:1.5">💡 ${q.reason}</div>
          </div>`;
        }).join("")}
      </div>
      
      <div style="display:flex;gap:8px">
        <button class="btn btn-ghost" style="flex:1" onclick="navigate('individual')">← Try Again</button>
        <button class="btn btn-purple" style="flex:1" onclick="navigate('scoreboard')">🏆 Leaderboard</button>
      </div>
    </div>`;
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
// Auto-refresh scoreboard every 15 seconds when on that view
setInterval(()=>{
  if(STATE.currentView==="scoreboard")render();
},15000);

render();
</script>
</body>
</html>
